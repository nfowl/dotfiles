# Prefix: Ctrl-a (matching zellij tmux mode trigger)
unbind C-b
set -g prefix C-b
bind C-b send-prefix

# General
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1

# Switch to tab by number (1-9)
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# Split panes — zellij: d/_ for down, r/|/\ for right
bind d split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind r split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"

# Fullscreen toggle (zellij: f)
bind f resize-pane -Z

# Floating pane equivalent — toggle a popup (zellij: w)
bind w display-popup -E -d "#{pane_current_path}"

# Copy on select
set -g @copy_use_osc52_fallback on
setw -g mode-keys vi
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Appearance (Tokyo Night Storm)
set -g status-style "bg=#24283b,fg=#c0caf5"
set -g window-status-style "fg=#565f89"
set -g window-status-current-style "fg=#c0caf5,bold"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#bb9af7"
set -g message-style "bg=#3b4261,fg=#c0caf5"
set -g status-left ""
set -g status-right "#[fg=#565f89]#H"
